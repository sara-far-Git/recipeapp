databases:
  - name: recipeapp-db
    plan: free
    databaseName: recipeapp
    user: recipeapp

services:
  - type: web
    name: recipeapp-backend
    plan: free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: recipeapp-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: DEBUG
        value: "false"
      - key: FRONTEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: recipeapp-frontend
    plan: free
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
